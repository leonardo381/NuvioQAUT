name: UI Tests Against Nuvio

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ui-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout QA repo
        uses: actions/checkout@v4
        with:
          path: NuvioQAUT

      - name: Checkout Nuvio repo
        uses: actions/checkout@v4
        with:
          repository: leonardo381/Nuvio
          path: Nuvio

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Start Nuvio with Docker Compose
        working-directory: Nuvio
        run: |
          docker compose up -d --build

      - name: Wait for Nuvio to be ready
        shell: bash
        run: |
          for i in {1..45}; do
            if curl -fsS http://127.0.0.1:8090/_/ > /dev/null; then
              echo "Nuvio is up"
              exit 0
            fi
            echo "Waiting for Nuvio..."
            sleep 2
          done

          echo "Nuvio did not become ready in time"
          docker ps -a
          cd Nuvio && docker compose logs || true
          exit 1

      - name: Restore tests
        working-directory: NuvioQAUT/PlaywrightBDD
        run: dotnet restore

      - name: Build tests
        working-directory: NuvioQAUT/PlaywrightBDD
        run: dotnet build --configuration Debug --no-restore

      - name: Install Playwright browsers
        working-directory: NuvioQAUT/PlaywrightBDD
        run: pwsh bin/Debug/net9.0/playwright.ps1 install --with-deps

      - name: Prepare artifact folders
        working-directory: NuvioQAUT/PlaywrightBDD
        run: |
          mkdir -p artifacts/traces
          mkdir -p artifacts/screenshots

      - name: Create PocketBase superuser
        working-directory: Nuvio
        env:
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          docker compose exec -T nuvio /app/nuvio superuser upsert "$ADMIN_USER" "$ADMIN_PASSWORD"

      - name: Run UI tests
        working-directory: NuvioQAUT/PlaywrightBDD
        env:
          BASE_URL: http://127.0.0.1:8090
          HEADLESS: true
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          TRACING: true
          SCREENSHOT_ON_FAILURE: true
          ARTIFACT_DIR: artifacts
        run: dotnet test --filter "Category=UI" --no-build

      - name: Export Nuvio logs
        if: always()
        working-directory: Nuvio
        run: |
          docker compose logs > nuvio.log 2>&1 || true

      - name: Debug artifact files
        if: always()
        working-directory: NuvioQAUT/PlaywrightBDD
        run: |
          pwd
          find artifacts -maxdepth 5 -type f | sort || true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            NuvioQAUT/PlaywrightBDD/artifacts/**
            Nuvio/nuvio.log

      - name: Stop Nuvio containers
        if: always()
        working-directory: Nuvio
        run: |
          docker compose down -v