name: UI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ui-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - run: dotnet restore
      - run: dotnet build --configuration Debug

      - name: Start PocketBase
        run: |
          chmod +x ./pocketbase
          nohup ./pocketbase serve --http=0.0.0.0:8090 &
          sleep 5

      - run: dotnet test --filter "Category=UI"
